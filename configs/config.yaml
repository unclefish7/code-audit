  # Input audit units JSON for LLM audit runner.
  input_audit_units_json: "outputs/context/context.json"
  # Output file for final deduplicated audit results.
  output_results_json: "outputs/results/audit_results.json"
  # Maximum iterative rounds for unknown->request-context->rejudge loop.
  max_iterations: 3
  # Whether to run validate stage after yes/no.
  enable_validate: true
  # New switch for validate stage (preferred). If false, skip validate and output reasoning result directly.
  validate_stage_enabled: false
  # If true, each LLM call starts a fresh session and includes full prompt + all accumulated contexts.
  # If false, iterative calls continue in one conversation session.
  stateless_llm_calls: false
  # Whether to deduplicate before writing result file.
  dedup_enabled: true
  # Maximum code lines per function context sent to LLM.
  # Increase this to allow larger function/context windows.
  llm_context_max_lines: 500

# Candidate rules switches
rules:
  enable_cwe78: true
  enable_cwe259: true

output:
  # Candidate JSON output path (relative to project root or absolute path)
  candidate_json: "outputs/context/context.json"

token:
  # Record and accumulate token usage from each LLM call when available.
  record_usage: true

logging:
  level: "INFO"
